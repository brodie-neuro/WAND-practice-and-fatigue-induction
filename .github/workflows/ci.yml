name: CI

on:
  push:
    paths:
      - '**.py'
      - 'requirements.txt'
      - '.github/workflows/**'
      - 'pyproject.toml'
      - 'MANIFEST.in'
      - 'wand_nback/config/*.json'
  pull_request:
    paths:
      - '**.py'
      - 'requirements.txt'
      - '.github/workflows/**'
      - 'pyproject.toml'
      - 'MANIFEST.in'
      - 'wand_nback/config/*.json'

jobs:
  test:
    name: Lint and Test
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-mock black isort
          # Install project requirements (Scipy, PsychoPy, pywin32, etc.)
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run isort (check only)
        shell: bash
        run: isort --check .

      - name: Run black (check only)
        shell: bash
        run: black --check .

      - name: Run tests
        shell: bash
        run:  pytest -v --tb=short
